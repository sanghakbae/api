name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Firebase web config is public (shipped in the client bundle) — safe to inline.
          VITE_FIREBASE_API_KEY: AIzaSyA42s5NB8t8_NbbXCakpriR_DyRa5_jRQw
          VITE_FIREBASE_AUTH_DOMAIN: api-search-mgmt-system.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: api-search-mgmt-system
          VITE_FIREBASE_STORAGE_BUCKET: api-search-mgmt-system.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1079954974376"
          VITE_FIREBASE_APP_ID: "1:1079954974376:web:983be9486fb6f6ac36049d"
          VITE_FIREBASE_MEASUREMENT_ID: G-GWGB1NTG2L
          VITE_ALLOWED_EMAILS: ${{ vars.ALLOWED_EMAILS || 'qa@muhayu.com' }}
          # Proxy/analyzer Worker (cross-origin; CORS handled in the Worker).
          VITE_WORKER_BASE: https://api-manager-proxy.totoriverce.workers.dev

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
