name = "api-manager-proxy"
main = "worker/index.js"
compatibility_date = "2024-12-01"

# api.sanghak.kr is served by GitHub Pages (DNS-only, not Cloudflare-proxied),
# so same-domain Worker routes don't apply. Instead the Worker is exposed on its
# workers.dev URL and the frontend calls it cross-origin (CORS handled in code).
workers_dev = true
